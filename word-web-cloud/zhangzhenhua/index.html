<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大华舅舅的日历</title>
    <style>
      :root {
        --bg: #f6f3ea;
        --ink: #1f2a1f;
        --muted: #5b6657;
        --accent: #0f7a57;
        --accent-2: #0c4f74;
        --line: #d8d2c2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--ink);
        font-family: "STKaiti", "Kaiti SC", "PingFang SC", serif;
        background:
          radial-gradient(circle at 20% 10%, #ece4d2 0%, transparent 40%),
          radial-gradient(circle at 80% 90%, #d8eadf 0%, transparent 35%),
          var(--bg);
        min-height: 100vh;
      }
      .page { width: min(1060px, 94vw); margin: 0 auto; padding: 28px 0 42px; }
      .brand { font-size: clamp(34px, 5vw, 56px); line-height: 1; margin-bottom: 8px; }
      .subtitle { margin: 0 0 18px; color: var(--muted); font-size: 18px; }
      .workspace {
        background: linear-gradient(165deg, rgba(255, 253, 247, 0.88), rgba(255, 251, 241, 0.95));
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 18px;
      }
      .hint { margin: 0 0 12px; color: var(--muted); }
      textarea {
        width: 100%; min-height: 88px; border-radius: 14px; border: 1px solid #c8c0ab;
        padding: 14px; resize: vertical; font-size: 18px; font-family: "PingFang SC", sans-serif; background: #fff;
      }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
      button {
        border: none; border-radius: 999px; padding: 10px 16px; cursor: pointer; font-size: 15px;
        transition: transform 180ms ease, opacity 180ms ease;
      }
      button:active { transform: translateY(1px) scale(0.99); }
      .primary { background: linear-gradient(110deg, var(--accent), var(--accent-2)); color: #fff; }
      .ghost { background: transparent; border: 1px solid #a8b6ac; color: #294337; }
      .warn { background: #a42020; color: #fff; }
      .message { min-height: 24px; margin-top: 10px; font-family: "PingFang SC", sans-serif; }

      .sync-panel {
        margin-top: 10px;
        padding: 10px;
        border-radius: 12px;
        border: 1px dashed #c8c0ab;
        font-family: "PingFang SC", sans-serif;
        display: none;
      }
      .ai-title { font-size: 13px; color: #355041; margin-bottom: 8px; }
      .ai-row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; margin-bottom: 8px; align-items: center; }
      .ai-row label { font-size: 13px; color: #5b6657; }
      .ai-row input {
        width: 100%; border: 1px solid #c8c0ab; border-radius: 8px; padding: 7px 10px; font-size: 13px;
      }
      .ai-inline { display: flex; gap: 8px; align-items: center; font-size: 13px; color: #355041; }

      .layout { margin-top: 18px; display: grid; grid-template-columns: 1.35fr 1fr; gap: 16px; }
      .panel { border: 1px solid var(--line); border-radius: 16px; padding: 12px; background: rgba(255, 255, 255, 0.72); }
      .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
      .cal-title { font-size: 20px; }
      .mini-btn { padding: 6px 10px; border-radius: 999px; border: 1px solid #bfc9bf; background: #fff; }
      .week, .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
      .grid { grid-auto-rows: 118px; }
      .week div { text-align: center; color: var(--muted); font-size: 12px; }
      .day {
        height: 118px; border: 1px solid #d9d5c9; border-radius: 10px; background: #fff;
        padding: 6px; display: flex; flex-direction: column; gap: 4px;
        cursor: pointer;
        transition: transform 120ms ease, box-shadow 120ms ease;
        overflow: hidden;
      }
      .day:hover { transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,0.08); }
      .day.muted { opacity: 0.4; cursor: default; }
      .day.today { outline: 2px solid #0f7a57; }
      .day.selected { box-shadow: inset 0 0 0 2px #0c4f74; }
      .day-head { display: flex; justify-content: space-between; align-items: center; }
      .dnum { font-size: 12px; font-family: "PingFang SC", sans-serif; }
      .count-pill {
        font-size: 11px;
        padding: 1px 6px;
        border-radius: 999px;
        color: #2c3d31;
        background: rgba(255,255,255,0.6);
      }
      .preview-list { display: grid; gap: 2px; }
      .preview-item {
        font-size: 11px;
        line-height: 1.2;
        font-family: "PingFang SC", sans-serif;
        color: #2a3a30;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .item-left { display: flex; align-items: center; gap: 8px; }
      .check {
        width: 16px;
        height: 16px;
      }

      .list-title { margin: 0 0 8px; font-size: 16px; }
      .item { border-bottom: 1px dashed #d8d2c2; padding: 8px 0; font-family: "PingFang SC", sans-serif; display: flex; justify-content: space-between; gap: 8px; }
      .item:last-child { border-bottom: none; }
      .empty { color: var(--muted); font-family: "PingFang SC", sans-serif; }
      .small-btn {
        border: 1px solid #ccbfbf;
        color: #8d2d2d;
        background: #fff;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
      }
      .legend { margin-top: 8px; font-size: 12px; color: #5b6657; font-family: "PingFang SC", sans-serif; }

      @media (max-width: 880px) {
        .layout { grid-template-columns: 1fr; }
      }
      @media (max-width: 700px) {
        .ai-row { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .workspace { border-radius: 18px; padding: 14px; }
        textarea { font-size: 16px; }
        button { width: 100%; }
        .mini-btn { width: auto; }
        .small-btn { width: auto; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="brand">大华舅舅的日历</div>
      <p class="subtitle">你说一句，我帮你存进这个网页日历（本地保存）</p>

      <section class="workspace">
        <p class="hint">示例：每天早上8点喝水 / 每天 20:30 跑步 / 每天晚上10点读书 / 周一到周五早上7点晨跑</p>
        <textarea id="input" placeholder="请输入或点语音按钮，例如：每天早上8点喝水"></textarea>

        <div class="actions">
          <button class="primary" id="saveBtn">添加到网页日历</button>
          <button class="ghost" id="undoBtn">向后回退</button>
          <button class="ghost" id="redoBtn">向前回退</button>
          <button class="ghost" id="micBtn">开始语音输入</button>
          <button class="ghost" id="syncBtn">保存计划</button>
          <button class="ghost" id="deleteByTextBtn">输入文字删除计划</button>
          <button class="ghost" id="clearBtn">清空输入</button>
        </div>

        <div class="sync-panel"></div>

        <div class="message" id="message"></div>

        <div class="layout">
          <section class="panel">
            <div class="cal-head">
              <button class="mini-btn" id="prevMonth">上月</button>
              <div class="cal-title" id="monthTitle"></div>
              <button class="mini-btn" id="nextMonth">下月</button>
            </div>
            <div class="week">
              <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
            </div>
            <div class="grid" id="calendarGrid"></div>
            <div class="legend">负载热度：绿（少）→ 黄（中）→ 红（多）</div>
          </section>

          <section class="panel">
            <h3 class="list-title" id="detailTitle">每天提醒列表</h3>
            <div id="items"></div>
          </section>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "dahua.daily.reminders.v2";
      const SYNC_CFG_KEY = "dahua.sync.config.v1";

      const inputEl = document.getElementById("input");
      const saveBtn = document.getElementById("saveBtn");
      const micBtn = document.getElementById("micBtn");
      const syncBtn = document.getElementById("syncBtn");
      const undoBtn = document.getElementById("undoBtn");
      const redoBtn = document.getElementById("redoBtn");
      const deleteByTextBtn = document.getElementById("deleteByTextBtn");
      const clearBtn = document.getElementById("clearBtn");
      const messageEl = document.getElementById("message");
      const monthTitleEl = document.getElementById("monthTitle");
      const calendarGridEl = document.getElementById("calendarGrid");
      const itemsEl = document.getElementById("items");
      const detailTitleEl = document.getElementById("detailTitle");
      const prevMonthBtn = document.getElementById("prevMonth");
      const nextMonthBtn = document.getElementById("nextMonth");

      const DEFAULT_SYNC_API_BASE = "https://zhangzh-sync-fn-mkrjlhmedg.cn-hangzhou.fcapp.run";

      let recognition = null;
      let listening = false;
      let reminders = loadReminders();
      let undoStack = [];
      let redoStack = [];
      let viewDate = new Date();
      let selectedDate = new Date();

      function containsAny(text, words) { return words.some((w) => text.includes(w)); }
      function pad(n) { return String(n).padStart(2, "0"); }
      function isoDate(date) {
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
      }
      function addDays(date, days) {
        const d = new Date(date);
        d.setDate(d.getDate() + days);
        return d;
      }
      function setMessage(text, isError = false) {
        messageEl.textContent = text;
        messageEl.style.color = isError ? "#9d1a1a" : "#0f5c3f";
      }
      function cloneRemindersState(src) {
        return JSON.parse(JSON.stringify(src));
      }
      function pushUndoState() {
        undoStack.push(cloneRemindersState(reminders));
        if (undoStack.length > 100) undoStack.shift();
        redoStack = [];
        updateUndoRedoButtons();
      }
      function updateUndoRedoButtons() {
        undoBtn.disabled = undoStack.length === 0;
        redoBtn.disabled = redoStack.length === 0;
      }

      function normalizeTime(hour, minute, sourceText) {
        let h = Math.max(0, Math.min(23, hour));
        const m = Math.max(0, Math.min(59, minute));
        const hasPMHint = containsAny(sourceText, ["下午", "晚上", "傍晚", "今晚"]);
        const hasNoonHint = containsAny(sourceText, ["中午"]);
        const hasMorningHint = containsAny(sourceText, ["早上", "上午", "清晨"]);
        const hasMidnightHint = containsAny(sourceText, ["凌晨"]);
        if (hasPMHint && h < 12) h += 12;
        if (hasNoonHint && h >= 1 && h <= 10) h += 12;
        if (hasMorningHint && h === 12) h = 0;
        if (hasMidnightHint && h === 12) h = 0;
        if (h === 24) h = 0;
        return [h, m];
      }

      function detectWeekdays(text) {
        if (text.includes("工作日") || text.includes("周一到周五") || text.includes("星期一到星期五")) {
          return [1, 2, 3, 4, 5];
        }
        const map = { "一": 1, "二": 2, "三": 3, "四": 4, "五": 5, "六": 6, "日": 0, "天": 0 };
        const hits = [...text.matchAll(/(?:周|星期)([一二三四五六日天])/g)].map((m) => map[m[1]]).filter((v) => v !== undefined);
        return [...new Set(hits)];
      }

      function parseReminderRule(raw) {
        const text = raw.trim().replaceAll("：", ":");
        if (!text) return null;

        let hour = 9;
        let minute = 0;
        let hasTime = false;

        let match = text.match(/(\d{1,2}):(\d{1,2})/);
        if (match) {
          [hour, minute] = normalizeTime(Number(match[1]), Number(match[2]), text);
          hasTime = true;
        } else {
          match = text.match(/(\d{1,2})点半/);
          if (match) {
            [hour, minute] = normalizeTime(Number(match[1]), 30, text);
            hasTime = true;
          } else {
            match = text.match(/(\d{1,2})点(\d{1,2})分?/);
            if (match) {
              [hour, minute] = normalizeTime(Number(match[1]), Number(match[2]), text);
              hasTime = true;
            } else {
              match = text.match(/(\d{1,2})点/);
              if (match) {
                [hour, minute] = normalizeTime(Number(match[1]), 0, text);
                hasTime = true;
              }
            }
          }
        }

        const weekdays = detectWeekdays(text);
        const hasDailyHint = /每天|每日/.test(text);

        let title = text
          .replace(/每天|每日|工作日|周一到周五|星期一到星期五/g, "")
          .replace(/今天|今晚|今早|今晨|今上午|今下午|明天|后天|大后天/g, "")
          .replace(/早上|上午|中午|下午|傍晚|晚上|今晚|凌晨|清晨/g, "")
          .replace(/\d{1,2}:\d{1,2}/g, "")
          .replace(/\d{1,2}点半/g, "")
          .replace(/\d{1,2}点\d{1,2}分?/g, "")
          .replace(/\d{1,2}点/g, "")
          .replace(/(?:周|星期)[一二三四五六日天]/g, "")
          .replace(/提醒我|记得|要|帮我|安排/g, "")
          .replace(/[，。,.]/g, "")
          .trim();

        if (!title) title = "每日提醒";

        let repeat = "once";
        let date = null;
        if (hasDailyHint) {
          repeat = "daily";
        } else if (weekdays.length) {
          repeat = "weekly";
        } else {
          const now = new Date();
          if (/大后天/.test(text)) date = isoDate(addDays(now, 3));
          else if (/后天/.test(text)) date = isoDate(addDays(now, 2));
          else if (/明天/.test(text)) date = isoDate(addDays(now, 1));
          else if (/今天|今晚|今早|今晨|今上午|今下午/.test(text)) date = isoDate(now);
          else {
            const candidate = new Date(now);
            candidate.setHours(hour, minute, 0, 0);
            date = isoDate(candidate > now ? now : addDays(now, 1));
          }
        }

        return {
          title,
          hour,
          minute,
          repeat,
          date,
          weekdays,
          confidence: hasTime ? 0.82 : 0.5
        };
      }

      async function parseReminderSmart(raw) {
        const rule = parseReminderRule(raw);
        return rule || null;
      }

      function splitIntoTaskChunks(text) {
        const normalized = text
          .replace(/[；;]/g, "，")
          .replace(/[。!！?？]/g, "，")
          .replace(/\s+/g, " ")
          .trim();
        if (!normalized) return [];
        return normalized
          .split(/[，,]/)
          .map((s) => s.trim())
          .filter(Boolean);
      }

      async function parseMultipleReminders(raw) {
        const chunks = splitIntoTaskChunks(raw);
        const results = [];
        for (const chunk of chunks) {
          const parsed = await parseReminderSmart(chunk);
          if (parsed) results.push(parsed);
        }
        return results;
      }

      function loadReminders() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const list = raw ? JSON.parse(raw) : [];
          return Array.isArray(list) ? list : [];
        } catch { return []; }
      }

      function persistReminders() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(reminders));
      }

      function loadSyncConfig() {
        try {
          const raw = localStorage.getItem(SYNC_CFG_KEY);
          const cfg = raw ? JSON.parse(raw) : {};
          return {
            apiBase: cfg.apiBase || DEFAULT_SYNC_API_BASE,
            password: cfg.password || ""
          };
        } catch {
          return { apiBase: DEFAULT_SYNC_API_BASE, password: "" };
        }
      }

      function saveSyncConfig(cfg) {
        localStorage.setItem(SYNC_CFG_KEY, JSON.stringify({
          apiBase: cfg.apiBase || DEFAULT_SYNC_API_BASE,
          password: cfg.password || ""
        }));
      }

      function ensureSyncConfig() {
        const cfg = loadSyncConfig();
        let changed = false;
        if (!cfg.password) {
          const input = window.prompt("首次同步：请输入同步密码");
          if (!input) return null;
          cfg.password = input.trim();
          changed = true;
        }
        if (!cfg.apiBase || cfg.apiBase.includes("YOUR_SUBDOMAIN")) {
          const base = window.prompt("首次同步：请输入同步服务地址", cfg.apiBase || DEFAULT_SYNC_API_BASE);
          if (!base) return null;
          cfg.apiBase = base.trim().replace(/\/$/, "");
          changed = true;
        }
        if (changed) saveSyncConfig(cfg);
        return cfg;
      }

      function makeReminderId(r) {
        const suffix = r.repeat === "weekly"
          ? r.weekdays.slice().sort().join("")
          : r.repeat === "once"
            ? (r.date || "no-date")
            : "D";
        return `${pad(r.hour)}:${pad(r.minute)}-${r.title}-${r.repeat}-${suffix}`;
      }

      function upsertReminder(parsed) {
        const normalized = {
          title: parsed.title,
          hour: parsed.hour,
          minute: parsed.minute,
          repeat: parsed.repeat === "weekly" ? "weekly" : parsed.repeat === "daily" ? "daily" : "once",
          date: parsed.date || null,
          weekdays: Array.isArray(parsed.weekdays) ? parsed.weekdays : [],
          completed: false
        };
        const id = makeReminderId(normalized);
        if (!reminders.find((r) => r.id === id)) {
          reminders.push({ id, ...normalized });
          reminders.sort((a, b) => (a.hour * 60 + a.minute) - (b.hour * 60 + b.minute));
          persistReminders();
          return true;
        }
        return false;
      }

      function removeReminder(id) {
        reminders = reminders.filter((r) => r.id !== id);
        persistReminders();
      }
      function toggleReminderCompleted(id, checked) {
        const found = reminders.find((r) => r.id === id);
        if (!found) return;
        found.completed = Boolean(checked);
        persistReminders();
      }

      function dateWeekday(date) {
        return date.getDay(); // 0-6
      }

      function matchesDate(reminder, date) {
        if (reminder.repeat === "daily") return true;
        if (reminder.repeat === "weekly") return reminder.weekdays.includes(dateWeekday(date));
        if (reminder.repeat === "once") return reminder.date === isoDate(date);
        return false;
      }

      function tasksForDate(date) {
        return reminders.filter((r) => matchesDate(r, date));
      }

      function colorByLoad(pendingCount) {
        if (pendingCount <= 0) return "#e6f5e8";
        if (pendingCount === 1) return "#d8f1dc";
        if (pendingCount === 2) return "#f5ecbf";
        if (pendingCount === 3) return "#f7ddb5";
        return "#f4c0b9";
      }

      function renderItems() {
        const selected = new Date(selectedDate);
        const dateStr = `${selected.getFullYear()}年${selected.getMonth() + 1}月${selected.getDate()}日`;
        const list = tasksForDate(selected);
        detailTitleEl.textContent = `${dateStr} 的任务（${list.length}）`;

        if (!list.length) {
          itemsEl.innerHTML = '<div class="empty">这一天没有任务。</div>';
          return;
        }
        itemsEl.innerHTML = list
          .map((r) => {
            const repeatText = r.repeat === "daily"
              ? "每天"
              : r.repeat === "weekly"
                ? `每周${r.weekdays.map((d) => "日一二三四五六"[d]).join("/")}`
                : `单次 ${r.date || ""}`;
            const checked = r.completed ? "checked" : "";
            return `<div class="item"><div class="item-left"><input class="check" type="checkbox" data-check-id="${escapeHtml(r.id)}" ${checked} /><div><strong>${pad(r.hour)}:${pad(r.minute)}</strong> ${escapeHtml(r.title)} <span style="color:#6b736b;font-size:12px;">(${repeatText})</span></div></div><button class="small-btn" data-id="${escapeHtml(r.id)}">删除</button></div>`;
          })
          .join("");

        itemsEl.querySelectorAll("input[data-check-id]").forEach((input) => {
          input.addEventListener("change", () => {
            pushUndoState();
            toggleReminderCompleted(input.getAttribute("data-check-id"), input.checked);
            renderItems();
            renderCalendar();
            setMessage("已更新任务完成状态。");
          });
        });
        itemsEl.querySelectorAll("button[data-id]").forEach((btn) => {
          btn.addEventListener("click", () => {
            pushUndoState();
            removeReminder(btn.getAttribute("data-id"));
            renderItems();
            renderCalendar();
            setMessage("已删除提醒。", true);
          });
        });
      }

      function renderCalendar() {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        monthTitleEl.textContent = `${year}年${month + 1}月`;

        const first = new Date(year, month, 1);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const lead = (first.getDay() + 6) % 7;
        const total = 42;
        const today = new Date();
        const selectedISO = isoDate(selectedDate);

        let html = "";
        for (let i = 0; i < total; i += 1) {
          const dayNum = i - lead + 1;
          const inMonth = dayNum >= 1 && dayNum <= daysInMonth;
          if (!inMonth) {
            html += `<div class="day muted"></div>`;
            continue;
          }

          const cellDate = new Date(year, month, dayNum);
          const isToday = isoDate(cellDate) === isoDate(today);
          const isSelected = isoDate(cellDate) === selectedISO;
          const tasks = tasksForDate(cellDate);
          const count = tasks.length;
          const pendingCount = tasks.filter((t) => !t.completed).length;
          const preview = tasks.slice(0, 2)
            .map((t) => `<div class="preview-item">${t.completed ? "☑" : "☐"} ${pad(t.hour)}:${pad(t.minute)} ${escapeHtml(t.title)}</div>`)
            .join("");

          html += `
            <div class="day ${isToday ? "today" : ""} ${isSelected ? "selected" : ""}"
              data-date="${isoDate(cellDate)}"
              style="background:${colorByLoad(pendingCount)};">
              <div class="day-head">
                <div class="dnum">${dayNum}</div>
                <div class="count-pill">${count}条</div>
              </div>
              <div class="preview-list">${preview}</div>
            </div>`;
        }
        calendarGridEl.innerHTML = html;

        calendarGridEl.querySelectorAll(".day[data-date]").forEach((el) => {
          el.addEventListener("click", () => {
            const [y, m, d] = el.getAttribute("data-date").split("-").map((n) => Number(n));
            selectedDate = new Date(y, m - 1, d);
            renderCalendar();
            renderItems();
          });
        });
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function nextOccurrence(hour, minute) {
        const now = new Date();
        const start = new Date(now);
        start.setHours(hour, minute, 0, 0);
        if (start <= now) start.setDate(start.getDate() + 1);
        return start;
      }

      function formatICSLocal(date) {
        return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}T${pad(date.getHours())}${pad(date.getMinutes())}00`;
      }
      function formatICSUTC(date) {
        return `${date.getUTCFullYear()}${pad(date.getUTCMonth() + 1)}${pad(date.getUTCDate())}T${pad(date.getUTCHours())}${pad(date.getUTCMinutes())}${pad(date.getUTCSeconds())}Z`;
      }
      function escapeICS(text) {
        return text.replace(/\\/g, "\\\\").replace(/,/g, "\\,").replace(/;/g, "\\;").replace(/\n/g, "\\n");
      }
      function buildICS(parsed) {
        let start = nextOccurrence(parsed.hour, parsed.minute);
        if (parsed.repeat === "once" && parsed.date) {
          const [y, m, d] = parsed.date.split("-").map((n) => Number(n));
          start = new Date(y, m - 1, d, parsed.hour, parsed.minute, 0, 0);
        }
        const end = new Date(start.getTime() + 30 * 60 * 1000);
        const dtStamp = formatICSUTC(new Date());
        const uid = `dahua-${Date.now()}-${Math.random().toString(16).slice(2)}@calendar.local`;
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || "Asia/Shanghai";
        const lines = [
          "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//DaHuaJiuJiu//DailyVoiceCalendar//CN", "CALSCALE:GREGORIAN", "METHOD:PUBLISH",
          "BEGIN:VEVENT", `UID:${uid}`, `DTSTAMP:${dtStamp}`, `SUMMARY:${escapeICS(parsed.title)}`,
          `DTSTART;TZID=${tz}:${formatICSLocal(start)}`, `DTEND;TZID=${tz}:${formatICSLocal(end)}`
        ];
        if (parsed.repeat === "weekly" && parsed.weekdays?.length) {
          const map = ["SU", "MO", "TU", "WE", "TH", "FR", "SA"];
          lines.push(`RRULE:FREQ=WEEKLY;BYDAY=${parsed.weekdays.map((d) => map[d]).join(",")}`);
        } else if (parsed.repeat === "daily") {
          lines.push("RRULE:FREQ=DAILY");
        }
        lines.push("BEGIN:VALARM", "TRIGGER:-PT0M", "ACTION:DISPLAY", "DESCRIPTION:提醒", "END:VALARM", "END:VEVENT", "END:VCALENDAR");
        return lines.join("\r\n");
      }
      function downloadICS(parsed) {
        const blob = new Blob([buildICS(parsed)], { type: "text/calendar;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${parsed.title.replace(/[\\/:*?"<>|]/g, "_") || "每日提醒"}.ics`;
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      }

      async function pullFromCloud() {
        const cfg = ensureSyncConfig();
        if (!cfg) return false;
        const resp = await fetch(`${cfg.apiBase}/schedule`, {
          headers: { "X-Sync-Password": cfg.password }
        });
        if (!resp.ok) throw new Error(`拉取失败(${resp.status})`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || "拉取失败");
        reminders = Array.isArray(data.reminders) ? data.reminders : [];
        persistReminders();
        renderItems();
        renderCalendar();
        return true;
      }

      async function syncToCloud() {
        const cfg = ensureSyncConfig();
        if (!cfg) return false;
        const resp = await fetch(`${cfg.apiBase}/schedule`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Sync-Password": cfg.password
          },
          body: JSON.stringify({
            reminders,
            updatedAt: new Date().toISOString()
          })
        });
        if (!resp.ok) throw new Error(`同步失败(${resp.status})`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.error || "同步失败");
        return true;
      }

      function canUseSpeech() { return "webkitSpeechRecognition" in window || "SpeechRecognition" in window; }
      function setupSpeech() {
        if (!canUseSpeech()) {
          micBtn.disabled = true;
          setMessage("当前浏览器不支持语音识别，请用 Safari 或 Chrome。", true);
          return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = "zh-CN";
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.onstart = () => { listening = true; micBtn.textContent = "停止语音输入"; micBtn.className = "warn"; setMessage("正在听你说话..."); };
        recognition.onresult = (event) => {
          let fullText = "";
          for (let i = event.resultIndex; i < event.results.length; i += 1) fullText += event.results[i][0].transcript;
          inputEl.value = fullText.trim();
        };
        recognition.onerror = () => { listening = false; micBtn.textContent = "开始语音输入"; micBtn.className = "ghost"; setMessage("语音识别失败，请确认麦克风权限。", true); };
        recognition.onend = () => { listening = false; micBtn.textContent = "开始语音输入"; micBtn.className = "ghost"; };
      }

      saveBtn.addEventListener("click", async () => {
        const content = inputEl.value.trim();
        if (!content) return setMessage("先输入提醒内容。", true);

        saveBtn.disabled = true;
        saveBtn.textContent = "解析中...";
        try {
          const parsedList = await parseMultipleReminders(content);
          if (!parsedList.length) {
            setMessage("没能识别，请换一种说法。", true);
            return;
          }
          let createdCount = 0;
          let duplicateCount = 0;
          const sample = [];
          for (const parsed of parsedList) {
            if (createdCount === 0 && duplicateCount === 0) pushUndoState();
            const created = upsertReminder(parsed);
            if (created) {
              createdCount += 1;
              if (sample.length < 2) sample.push(`${pad(parsed.hour)}:${pad(parsed.minute)} ${parsed.title}`);
            } else {
              duplicateCount += 1;
            }
          }
          renderItems();
          renderCalendar();
          if (createdCount > 0) {
            setMessage(`已新增 ${createdCount} 条${duplicateCount ? `，重复 ${duplicateCount} 条` : ""}。${sample.length ? ` 示例：${sample.join("；")}` : ""}`);
          } else {
            setMessage("解析成功，但这些提醒已存在。", true);
          }
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = "添加到网页日历";
        }
      });

      syncBtn.addEventListener("click", async () => {
        syncBtn.disabled = true;
        syncBtn.textContent = "同步中...";
        try {
          const ok = await syncToCloud();
          if (ok) setMessage("已保存并同步到云端。");
        } catch (e) {
          setMessage(`同步失败：${e.message}`, true);
        } finally {
          syncBtn.disabled = false;
          syncBtn.textContent = "保存计划";
        }
      });

      micBtn.addEventListener("click", () => {
        if (!recognition) return;
        try { listening ? recognition.stop() : recognition.start(); }
        catch { setMessage("无法启动语音识别，请稍后再试。", true); }
      });

      clearBtn.addEventListener("click", () => { inputEl.value = ""; setMessage("已清空输入。"); });
      deleteByTextBtn.addEventListener("click", () => {
        const keyword = (window.prompt("输入要删除的计划关键词（如：跑步）") || "").trim();
        if (!keyword) return;
        const before = reminders.length;
        const next = reminders.filter((r) => !(`${r.title} ${pad(r.hour)}:${pad(r.minute)}`.includes(keyword)));
        if (next.length === before) {
          setMessage("没有匹配到要删除的计划。", true);
          return;
        }
        pushUndoState();
        reminders = next;
        persistReminders();
        renderItems();
        renderCalendar();
        setMessage(`已删除 ${before - next.length} 条匹配“${keyword}”的计划。`);
      });
      undoBtn.addEventListener("click", () => {
        if (!undoStack.length) return;
        redoStack.push(cloneRemindersState(reminders));
        reminders = undoStack.pop();
        persistReminders();
        renderItems();
        renderCalendar();
        updateUndoRedoButtons();
        setMessage("已向后回退一步。");
      });
      redoBtn.addEventListener("click", () => {
        if (!redoStack.length) return;
        undoStack.push(cloneRemindersState(reminders));
        reminders = redoStack.pop();
        persistReminders();
        renderItems();
        renderCalendar();
        updateUndoRedoButtons();
        setMessage("已向前回退一步。");
      });
      prevMonthBtn.addEventListener("click", () => { viewDate.setMonth(viewDate.getMonth() - 1); renderCalendar(); });
      nextMonthBtn.addEventListener("click", () => { viewDate.setMonth(viewDate.getMonth() + 1); renderCalendar(); });

      setupSpeech();
      renderItems();
      renderCalendar();
      updateUndoRedoButtons();
      pullFromCloud().then((ok) => {
        if (ok) setMessage("已拉取最新计划。");
      }).catch(() => {
        // 初次打开可能还没配置 Worker，忽略
      });
      setInterval(async () => {
        try {
          await syncToCloud();
          setMessage("已自动同步（每5分钟）。");
        } catch {
          // 自动同步失败时不打断使用
        }
      }, 5 * 60 * 1000);
    </script>
  </body>
</html>
